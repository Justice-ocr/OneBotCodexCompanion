name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      PUBLISH_DIR: publish

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows application
        shell: pwsh
        run: >-
          dotnet publish OneBotCodexCompanion.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output $env:PUBLISH_DIR

      - name: Create release archive
        shell: pwsh
        run: >-
          Compress-Archive
          -Path "$env:PUBLISH_DIR\\*"
          -DestinationPath "OneBotCodexCompanion-win-x64.zip"
          -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OneBotCodexCompanion-win-x64
          path: OneBotCodexCompanion-win-x64.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OneBot Codex Companion ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: OneBotCodexCompanion-win-x64.zip
